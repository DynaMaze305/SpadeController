version: '3.8'

services:
  agent:
    build: .
    container_name: spadecontroller-agent
    privileged: true
    devices:
      - /dev/gpiomem:/dev/gpiomem
      - /dev/vchiq:/dev/vchiq
      - /dev/video0:/dev/video0
      - /dev/dma_heap:/dev/dma_heap
    extra_hosts:
      - "isc-coordinator.lan:192.168.88.250"
      - "isc-coordinator2.lan:192.168.88.226"
    cap_add:
      - SYS_RAWIO
    environment:
      XMPP_SERVER: "prosody"
      XMPP_PORT: 5222
      PYTHONUNBUFFERED: 1
      LIBCAMERA_LOG_LEVELS: "*:ERROR"
    ports:
      - "8000:8000"   # Camera stream
    volumes:
      - /run/udev:/run/udev:ro
      - ./agent:/agent
    env_file:
      - ./.env.remote